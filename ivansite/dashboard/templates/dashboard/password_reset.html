{% extends 'dashboard/base.html' %}
{% block title %}Восстановление пароля — Финансовый помощник{% endblock %}
{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6fb;padding:2rem;">
    <div style="width:100%;max-width:420px;">
        <div style="text-align:center;margin-bottom:1.5rem;">
            <div style="width:50px;height:50px;background:#7c3aed;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2 style="font-size:1.4rem;font-weight:700;">Восстановление пароля</h2>
            <p style="color:#6b7280;font-size:.875rem;margin-top:.3rem;">Введите email — мы отправим ссылку для сброса пароля</p>
        </div>
        <div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:2rem;box-shadow:0 2px 8px rgba(0,0,0,.06);">
            <form method="post">
                {% csrf_token %}
                <div style="margin-bottom:1.25rem;">
                    <label style="display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.4rem;">Email</label>
                    <input type="email" name="email" required autofocus
                        style="width:100%;padding:.6rem .85rem;border:1px solid #e5e7eb;border-radius:8px;font-size:.875rem;outline:none;">
                </div>
                <button type="submit" style="width:100%;padding:.7rem;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;">Отправить ссылку</button>
            </form>
        </div>
        <p style="text-align:center;margin-top:1.1rem;font-size:.85rem;color:#6b7280;">
            <a href="{% url 'finassist:login' %}" style="color:#7c3aed;font-weight:600;text-decoration:none;">← Вернуться ко входу</a>
        </p>
    </div>
</div>
{% endblock %}
