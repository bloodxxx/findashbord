{% extends 'dashboard/base.html' %}
{% block title %}Ссылка отправлена — ФинДашборд{% endblock %}
{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6fb;padding:2rem;">
    <div style="width:100%;max-width:420px;text-align:center;">
        <div style="width:50px;height:50px;background:#d1fae5;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h2 style="font-size:1.4rem;font-weight:700;">Проверьте почту</h2>
        <p style="color:#6b7280;font-size:.9rem;margin-top:.6rem;line-height:1.6;">Если аккаунт с указанным email существует, мы отправили на него письмо с инструкциями по восстановлению пароля.</p>
        <p style="margin-top:1.25rem;"><a href="{% url 'dashboard:login' %}" style="color:#7c3aed;font-weight:600;text-decoration:none;">← Вернуться ко входу</a></p>
    </div>
</div>
{% endblock %}
