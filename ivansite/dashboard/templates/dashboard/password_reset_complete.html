{% extends 'dashboard/base.html' %}
{% block title %}Пароль изменён — Финансовый помощник{% endblock %}
{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6fb;padding:2rem;">
    <div style="width:100%;max-width:420px;text-align:center;">
        <div style="width:50px;height:50px;background:#d1fae5;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2 style="font-size:1.4rem;font-weight:700;">Пароль изменён</h2>
        <p style="color:#6b7280;font-size:.9rem;margin-top:.6rem;">Теперь вы можете войти с новым паролем.</p>
        <p style="margin-top:1.25rem;"><a href="{% url 'finassist:login' %}" style="display:inline-block;padding:.6rem 1.5rem;background:#7c3aed;color:#fff;border-radius:8px;font-weight:600;text-decoration:none;font-size:.9rem;">Войти</a></p>
    </div>
</div>
{% endblock %}
